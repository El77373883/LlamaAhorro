<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ahorro Pro">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <link rel="manifest" href="manifest.json">
    <title>Ahorro Pro 🔥</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0A0A0A;
            --bg-secondary: #111111;
            --bg-card: #1A1A1A;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --accent-gold: #FFD700;
            --accent-fire: #FF4500;
            --accent-green: #00FF88;
            --accent-blue: #00D4FF;
            --border-color: #2A2A2A;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: var(--safe-bottom);
            overflow-x: hidden;
            position: relative;
        }

        /* Fondo animado con partículas */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            font-size: 24px;
            animation: floatUp 4s ease-in infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            20% {
                opacity: 0.3;
            }
            80% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        #app {
            max-width: 480px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header Ultra Pro */
        .header-pro {
            padding: 20px;
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        .header-glow {
            position: absolute;
            top: -50%;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .avatar-container {
            position: relative;
        }

        .avatar-gif {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid var(--accent-gold);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            object-fit: cover;
        }

        .fire-gif {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
        }

        .user-info-pro h2 {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .level-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #FF4500, #FF6B00);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-top: 4px;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.3);
        }

        .streak-fire {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 69, 0, 0.1);
            border: 1px solid rgba(255, 69, 0, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
        }

        .streak-fire img {
            width: 30px;
            height: 30px;
        }

        .streak-number {
            font-size: 18px;
            font-weight: 900;
            color: #FF4500;
        }

        /* Balance Card Premium */
        .balance-premium {
            position: relative;
            background: linear-gradient(135deg, #1A1A1A 0%, #2A2A2A 100%);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            margin: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .balance-premium::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.05) 0%, transparent 70%);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .piggy-bank-gif {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            display: block;
        }

        .balance-label {
            font-size: 14px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .balance-amount-pro {
            font-size: 56px;
            font-weight: 900;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .coins-rain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .coin {
            position: absolute;
            font-size: 20px;
            animation: coinDrop 3s ease-in infinite;
        }

        @keyframes coinDrop {
            0% {
                transform: translateY(-100%) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(400px) rotate(720deg);
                opacity: 0;
            }
        }

        /* Quick Actions Premium */
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 0 20px;
            margin-bottom: 20px;
        }

        .action-card {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .action-card:active {
            transform: scale(0.95);
            border-color: var(--accent-gold);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }

        .action-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .action-label {
            font-size: 13px;
            font-weight: 600;
        }

        /* Tabs Premium */
        .tabs-premium {
            display: flex;
            gap: 8px;
            padding: 0 20px;
            margin-bottom: 20px;
        }

        .tab-premium {
            flex: 1;
            padding: 14px;
            text-align: center;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .tab-premium.active {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000000;
            border: none;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            transform: translateY(-2px);
        }

        /* Goal Card Ultra */
        .goal-ultra {
            position: relative;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 24px;
            margin: 0 20px 16px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            overflow: hidden;
        }

        .goal-ultra::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .goal-ultra-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .goal-emoji-container {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background: rgba(255, 215, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .goal-name-pro {
            font-size: 20px;
            font-weight: 800;
        }

        .goal-meta-pro {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .progress-ring-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            position: relative;
        }

        .progress-ring {
            width: 140px;
            height: 140px;
            transform: rotate(-90deg);
        }

        .progress-ring-bg {
            fill: none;
            stroke: var(--border-color);
            stroke-width: 10;
        }

        .progress-ring-fill {
            fill: none;
            stroke: url(#goldGradient);
            stroke-width: 10;
            stroke-linecap: round;
            transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
        }

        .progress-center-text {
            position: absolute;
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats-grid-pro {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 16px;
        }

        .stat-pro {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 14px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-pro-label {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .stat-pro-value {
            font-size: 20px;
            font-weight: 800;
        }

        .goal-actions-pro {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .btn-premium {
            flex: 1;
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-premium:active {
            transform: scale(0.95);
        }

        .btn-save {
            background: linear-gradient(135deg, #00FF88, #00CC6A);
            color: #000000;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }

        .btn-withdraw-premium {
            background: linear-gradient(135deg, #FF4500, #FF6B00);
            color: white;
            box-shadow: 0 10px 30px rgba(255, 69, 0, 0.3);
        }

        .btn-edit-premium {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            max-width: 50px;
        }

        /* History Premium */
        .history-item-premium {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            margin: 0 20px 12px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s;
        }

        .history-icon-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .history-icon-circle.deposit {
            background: rgba(0, 255, 136, 0.1);
        }

        .history-icon-circle.withdraw {
            background: rgba(255, 69, 0, 0.1);
        }

        /* Achievements Premium */
        .achievement-premium {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .achievement-premium.unlocked {
            border-color: var(--accent-gold);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }

        .achievement-gif {
            width: 60px;
            height: 60px;
            margin-bottom: 12px;
        }

        /* Modal Premium */
        .modal-premium-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 1000;
        }

        .modal-premium-overlay.active {
            display: flex;
        }

        .modal-premium-sheet {
            background: #1A1A1A;
            border-radius: 32px 32px 0 0;
            padding: 32px 24px;
            width: 100%;
            max-width: 480px;
            max-height: 85vh;
            overflow-y: auto;
            border-top: 1px solid var(--border-color);
            box-shadow: 0 -20px 60px rgba(0, 0, 0, 0.8);
        }

        .modal-handle-premium {
            width: 40px;
            height: 5px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 3px;
            margin: 0 auto 24px;
        }

        .input-premium {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 18px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            outline: none;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .input-premium:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
        }

        .btn-calculate-premium {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000000;
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.3);
            margin-top: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-calculate-premium:active {
            transform: scale(0.98);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state-gif {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
        }

        .empty-state-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .empty-state-text {
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-gold);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <!-- Partículas de fondo -->
    <div class="bg-particles" id="particles"></div>

    <div id="app">
        <!-- Header -->
        <div class="header-pro">
            <div class="header-glow"></div>
            <div class="profile-section">
                <div class="avatar-container">
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYjZ6eHh4eHh4eHh4eA/3o7btPCcdNniyf0ArS/giphy.gif" 
                         class="avatar-gif" 
                         alt="Llama"
                         onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2260%22 height=%2260%22><rect fill=%22%23FFD700%22 width=%2260%22 height=%2260%22 rx=%2230%22/><text x=%2230%22 y=%2240%22 font-size=%2230%22 text-anchor=%22middle%22>🦙</text></svg>'">
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExc2h4eHh4eHh4eA/xT9DPldJHzZKtORo3C/giphy.gif" 
                         class="fire-gif" 
                         alt="🔥"
                         onerror="this.style.display='none'">
                </div>
                <div class="user-info-pro">
                    <h2>Maestro del Ahorro</h2>
                    <div class="level-badge">
                        <span>🦙</span> Nivel Llama Pro
                    </div>
                </div>
                <div class="streak-fire">
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExdnh4eHh4eHh4eA/xT9DPldJHzZKtORo3C/giphy.gif" 
                         alt="🔥" 
                         width="30"
                         onerror="this.outerHTML='🔥'">
                    <span class="streak-number" id="streakNumber">15</span>
                    <span style="font-size:12px; color: var(--text-secondary);">días</span>
                </div>
            </div>
        </div>

        <!-- Balance Card -->
        <div class="balance-premium" id="balanceCard">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExaHh4eHh4eHh4eA/3o6Zt481isNVuQI1l6/giphy.gif" 
                 class="piggy-bank-gif" 
                 alt="Alcancía"
                 onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2280%22 height=%2280%22><rect fill=%22%23FFD700%22 width=%2280%22 height=%2280%22 rx=%2215%22/><text x=%2240%22 y=%2255%22 font-size=%2240%22 text-anchor=%22middle%22>🐷</text></svg>'">
            <div class="balance-label">Ahorro Total</div>
            <div class="balance-amount-pro" id="totalSavings">$0.00</div>
            <div class="coins-rain" id="coinsRain"></div>
        </div>

        <!-- Quick Actions -->
        <div class="actions-grid">
            <div class="action-card" onclick="openQuickAdd()">
                <div class="action-icon">💰</div>
                <div class="action-label">Depositar</div>
            </div>
            <div class="action-card" onclick="openQuickWithdraw()">
                <div class="action-icon">💸</div>
                <div class="action-label">Retirar</div>
            </div>
            <div class="action-card" onclick="openNewGoal()">
                <div class="action-icon">🎯</div>
                <div class="action-label">Nueva Meta</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs-premium">
            <div class="tab-premium active" onclick="switchTab('goals')">🎯 Metas</div>
            <div class="tab-premium" onclick="switchTab('history')">📊 Historial</div>
            <div class="tab-premium" onclick="switchTab('achievements')">🏆 Logros</div>
        </div>

        <!-- Contenedores -->
        <div id="goalsContainer"></div>
        <div id="historyContainer" style="display:none;"></div>
        <div id="achievementsContainer" style="display:none;"></div>
    </div>

    <!-- Modales -->
    <div class="modal-premium-overlay" id="quickAddModal">
        <div class="modal-premium-sheet">
            <div class="modal-handle-premium"></div>
            <h2 style="font-size:28px; font-weight:800; margin-bottom:24px;">💰 Depositar Ahorro</h2>
            <div style="margin-bottom:20px;">
                <label style="font-size:14px; color:var(--text-secondary); margin-bottom:8px; display:block;">Cantidad</label>
                <input type="number" class="input-premium" id="quickAddAmount" placeholder="$0.00" step="0.01">
            </div>
            <div style="margin-bottom:20px;">
                <label style="font-size:14px; color:var(--text-secondary); margin-bottom:8px; display:block;">Meta</label>
                <select id="quickAddGoal" class="input-premium"></select>
            </div>
            <button class="btn-calculate-premium" onclick="quickAdd()">💾 Guardar Depósito</button>
            <button class="btn-premium" style="margin-top:12px; width:100%; background:transparent; color:white; border:1px solid var(--border-color); letter-spacing:1px;" onclick="closeModal('quickAddModal')">Cancelar</button>
        </div>
    </div>

    <div class="modal-premium-overlay" id="quickWithdrawModal">
        <div class="modal-premium-sheet">
            <div class="modal-handle-premium"></div>
            <h2 style="font-size:28px; font-weight:800; margin-bottom:24px;">💸 Retirar Dinero</h2>
            <div style="margin-bottom:20px;">
                <label style="font-size:14px; color:var(--text-secondary); margin-bottom:8px; display:block;">Cantidad a retirar</label>
                <input type="number" class="input-premium" id="quickWithdrawAmount" placeholder="$0.00" step="0.01">
            </div>
            <div style="margin-bottom:20px;">
                <label style="font-size:14px; color:var(--text-secondary); margin-bottom:8px; display:block;">De la meta</label>
                <select id="quickWithdrawGoal" class="input-premium"></select>
            </div>
            <button class="btn-calculate-premium" style="background: linear-gradient(135deg, #FF4500, #FF6B00);" onclick="quickWithdraw()">💸 Confirmar Retiro</button>
            <button class="btn-premium" style="margin-top:12px; width:100%; background:transparent; color:white; border:1px solid var(--border-color); letter-spacing:1px;" onclick="closeModal('quickWithdrawModal')">Cancelar</button>
        </div>
    </div>

    <div class="modal-premium-overlay" id="newGoalModal">
        <div class="modal-premium-sheet">
            <div class="modal-handle-premium"></div>
            <h2 style="font-size:28px; font-weight:800; margin-bottom:24px;">🎯 Nueva Meta</h2>
            <div style="margin-bottom:20px;">
                <label style="font-size:14px; color:var(--text-secondary); margin-bottom:8px; display:block;">Nombre</label>
                <input type="text" class="input-premium" id="goalName" placeholder="Ej: Moto Ducati" style="font-size:16px;">
            </div>
            <div style="margin-bottom:20px;">
                <label style="font-size:14px; color:var(--text-secondary); margin-bottom:12px; display:block;">Ícono</label>
                <div id="emojiPicker" style="display:flex; gap:8px; flex-wrap:wrap;"></div>
            </div>
            <div style="margin-bottom:20px;">
                <label style="font-size:14px; color:var(--text-secondary); margin-bottom:8px; display:block;">Meta total</label>
                <input type="number" class="input-premium" id="goalAmount" placeholder="$0.00">
            </div>
            <div style="margin-bottom:20px;">
                <label style="font-size:14px; color:var(--text-secondary); margin-bottom:8px; display:block;">Fecha objetivo</label>
                <input type="date" class="input-premium" id="goalDate">
            </div>
            <div id="calculationResult" style="display:none;"></div>
            <button class="btn-calculate-premium" id="calculateBtn" onclick="calculateSavings()">🧮 Calcular Plan</button>
            <button class="btn-calculate-premium" id="saveGoalBtn" onclick="saveGoal()" style="display:none; margin-top:12px;">✅ Crear Meta</button>
            <button class="btn-premium" style="margin-top:12px; width:100%; background:transparent; color:white; border:1px solid var(--border-color); letter-spacing:1px;" onclick="closeModal('newGoalModal')">Cancelar</button>
        </div>
    </div>

    <!-- SVG Gradiente para el anillo de progreso -->
    <svg style="position:absolute; width:0; height:0;">
        <defs>
            <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#FFD700" />
                <stop offset="50%" style="stop-color:#FFA500" />
                <stop offset="100%" style="stop-color:#FFD700" />
            </linearGradient>
        </defs>
    </svg>

    <script src="db.js"></script>
    <script src="app.js"></script>
</body>
</html>
